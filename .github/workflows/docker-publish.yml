# Dieser Workflow ist für das Bauen und Veröffentlichen eines Docker-Images auf Docker Hub verantwortlich. Er wird ausgelöst, wenn es einen Push auf den main-Branch gibt oder manuell über die GitHub-Oberfläche gestartet wird. Der Workflow besteht aus zwei Jobs: "test" und "docker". Der "test"-Job baut und testet das Docker-Image, während der "docker"-Job das Image baut und auf Docker Hub veröffentlicht, wenn die Tests erfolgreich sind. Die Docker Hub Anmeldeinformationen und die Image-Namen werden als Umgebungsvariablen definiert, wobei die Anmeldeinformationen aus den Repository-Geheimnissen stammen. Der Workflow verwendet verschiedene Aktionen, um die erforderlichen Schritte für das Bauen, Testen und Veröffentlichen des Docker-Images durchzuführen.
name: Docker Publish

# Der Workflow läuft nur bei Pushes auf main. Zusätzlich erlaubt workflow_dispatch einen manuellen Start über die GitHub-Oberfläche. GitHub dokumentiert sowohl Branch-Filter für push als auch workflow_dispatch für manuell auslösbare Workflows.
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
# Die Umgebungsvariablen für die Docker Hub Anmeldeinformationen und die Image-Namen werden aus den Repository-Geheimnissen und festen Werten gesetzt.
    DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

# Die Image-Namen für das Haupt-Image und das Test-Image werden als Umgebungsvariablen definiert. Das Haupt-Image wird unter "mshhssn/lab-d3-task-app-dh" veröffentlicht, während das Test-Image mit einem zusätzlichen Tag "test-ci" versehen wird.
    IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/lab-d3-task-app-dh
    TEST_IMAGE_NAME: lab-d3-task-app-dh:test-ci


# Der Workflow besteht aus einem Job namens "docker". Dieser Job läuft auf einem Ubuntu-Latest-Runner. Die Berechtigungen für den Job sind so eingestellt, dass er nur Lesezugriff auf die Repository-Inhalte hat.
jobs:

# Der Job "test" baut und testet das Docker-Image, bevor es veröffentlicht wird. Er läuft auf einem Ubuntu-Latest-Runner und hat ebenfalls nur Lesezugriff auf die Repository-Inhalte.
  test:
    name: Build and test Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:

# Der erste Schritt des Jobs ist das Auschecken des Repositorys, um Zugriff auf die Dockerfile und die Anwendungsdateien zu erhalten.
        - name: Checkout repository
          uses: actions/checkout@v4

# Danach wird überprüft, ob die erforderlichen Dateien für den Docker-Build und die Anwendung vorhanden sind. Es wird getestet, ob die Dockerfile sowie die Anwendungsdateien (index.html, style.css, app.js) existieren.
        - name: Verify required files
          run: |
            echo "Checking for required files..."
            echo
            missing_files=false
           
            for file in Dockerfile app/index.html app/style.css app/app.js; do
              if [ ! -f "$file" ]; then
                echo "Error: Required file '$file' is missing."
                missing_files=true
              else
                echo "Found required file: $file"
              fi
            done

            echo
            echo "Contents of app directory:"
            ls -l app || true
            echo

            if [ "$missing_files" = true ]; then
              echo "Error: One or more required files are missing."
              exit 1
            else
              echo "All required files are present."
            fi

# Anschließend wird das Docker-Image mit dem Namen "lab-d3-task-app-dh:test-ci" gebaut. Das Image wird lokal erstellt und nicht gepusht, da es nur für die Tests verwendet wird.
        - name: Build test docker image
          run: docker build -t $TEST_IMAGE_NAME .

# Nach dem Build wird das Docker-Image getestet, indem ein Container gestartet und eine HTTP-Anfrage an die Anwendung gesendet wird. Es wird überprüft, ob die Anwendung ordnungsgemäß läuft und auf Port 8080 erreichbar ist. Wenn die HTTP-Anfrage fehlschlägt, werden die Logs des Containers angezeigt, um mögliche Fehler zu diagnostizieren. Am Ende werden der Test-Container und das Test-Image bereinigt, um Ressourcen freizugeben.
        - name: Run test container
          run: |
            docker run -d --name task-app-test-ctr -p 8080:80 $TEST_IMAGE_NAME
            sleep 5
        
# Es wird eine HTTP-Anfrage an die Anwendung gesendet, um zu überprüfen, ob sie ordnungsgemäß läuft. Wenn die Anfrage fehlschlägt, wird der Workflow mit einem Fehlerstatus beendet.
        - name: HTTP check
          run: |
            curl --fail --show-error --silent http://localhost:8080 > /tmp/task-app-response.html
            echo "HTTP check passed."
            echo "Response preview:"
            head -n 20 /tmp/task-app-response.html || true
        

# Wenn die HTTP-Anfrage fehlschlägt, werden die Logs des Test-Containers angezeigt, um mögliche Fehler zu diagnostizieren. Dies hilft dabei, Probleme mit der Anwendung oder dem Docker-Image zu identifizieren. Das "if: failure()" stellt sicher, dass dieser Schritt nur ausgeführt wird, wenn die vorherige HTTP-Anfrage fehlschlägt. Das "|| true" am Ende der Docker-Logs-Anzeige stellt sicher, dass der Workflow nicht mit einem Fehlerstatus endet, wenn das Anzeigen der Logs fehlschlägt (z.B. wenn der Container nicht existiert oder bereits gestoppt wurde). Dies gewährleistet, dass der Workflow nicht unnötig fehlschlägt, wenn es Probleme beim Anzeigen der Logs gibt, während gleichzeitig wichtige Informationen über den Fehler bereitgestellt werden.
        - name: Show container failure logs
          if: failure()
          run: |
            echo "Container list:"
            docker ps -a || true
            echo
            echo "Container logs:"
            docker logs task-app-test || true

# Am Ende des Test-Jobs werden der Test-Container und das Test-Image bereinigt, um Ressourcen freizugeben. Das "if: always()" stellt sicher, dass dieser Schritt unabhängig vom Erfolg oder Misserfolg der vorherigen Schritte ausgeführt wird. Das "|| true" am Ende der Docker-Befehle stellt sicher, dass der Workflow nicht mit einem Fehlerstatus endet, wenn das Entfernen des Containers oder Images fehlschlägt (z.B. wenn sie bereits entfernt wurden). Dies gewährleistet, dass der Workflow nicht unnötig fehlschlägt, wenn die Bereinigung bereits erfolgt ist oder wenn es Probleme beim Entfernen gibt. Die Bereinigung ist wichtig, um sicherzustellen, dass keine unnötigen Ressourcen auf dem Runner verbleiben, die den Speicherplatz oder die Leistung beeinträchtigen könnten.
        - name: Cleanup test container and image
          if: always()
          run: |
            docker rm -f task-app-test-ctr || true
            docker rmi $TEST_IMAGE_NAME || true

# Der "docker-push"-Job baut und veröffentlicht das Docker-Image auf Docker Hub, wenn die Tests erfolgreich sind. Er läuft auf einem Ubuntu-Latest-Runner und hat ebenfalls nur Lesezugriff auf die Repository-Inhalte. Der Job ist so konfiguriert, dass er erst ausgeführt wird, wenn der "test"-Job erfolgreich abgeschlossen wurde (needs: test). Die Schritte des Jobs umfassen das Auschecken des Repositorys, das Einrichten von Docker Buildx, die Anmeldung bei Docker Hub mit den gespeicherten Anmeldeinformationen, das Extrahieren der Docker-Metadaten für die Tags und Labels des Images sowie das Bauen und Pushen des Docker-Images auf Docker Hub. Das Image wird mit den entsprechenden Tags versehen, einschließlich "latest" und einem SHA-Tag basierend auf dem Commit-SHA. Die Verwendung von Docker Buildx ermöglicht es, die Erstellung von Docker-Images zu optimieren und verschiedene Plattformen zu unterstützen. Die Anmeldung bei Docker Hub stellt sicher, dass das Image erfolgreich gepusht werden kann, während die Extraktion der Docker-Metadaten sicherstellt, dass die Tags und Labels korrekt gesetzt werden, um die Versionierung und Identifikation des Images zu erleichtern. Am Ende wird das Docker-Image auf Docker Hub veröffentlicht, sodass es für die weitere Verwendung oder Bereitstellung verfügbar ist.
  docker-push:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    
# Die Schritte des Jobs umfassen das Auschecken des Repositorys.   
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

# Danach wird Docker Buildx eingerichtet, um die Erstellung von Docker-Images zu ermöglichen.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

# Anschließend erfolgt die Anmeldung bei Docker Hub mit den in den Repository-Geheimnissen gespeicherten Anmeldeinformationen.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

# Danach wird die Docker-Metadaten-Aktion verwendet, um die Tags und Labels für das Docker-Image zu extrahieren. Das Image wird mit dem Namen "mshhssn/lab-d3-task-app-dh" getaggt, wobei "latest" und ein SHA-Tag basierend auf dem Commit-SHA verwendet werden.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enabled={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - name: Show generated tags and labels
        run: |
          echo "Generated tags: ${{ steps.meta.outputs.tags }}"
          echo "Generated labels: ${{ steps.meta.outputs.labels }}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}